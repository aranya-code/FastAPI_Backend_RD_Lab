<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI Todo App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen p-8">

    <div class="max-w-md mx-auto bg-white rounded-lg shadow-md overflow-hidden">
        
        <div class="bg-indigo-600 p-4 text-white flex justify-between items-center">
            <h1 class="text-xl font-bold">✅ My Tasks</h1>
            <button id="logoutBtn" onclick="logout()" class="hidden text-sm bg-indigo-700 hover:bg-indigo-800 px-3 py-1 rounded">Logout</button>
        </div>

        <div class="p-6">
            <div id="authSection">
                <div class="flex mb-4 border-b">
                    <button onclick="toggleAuth('login')" id="tabLogin" class="w-1/2 py-2 font-semibold text-indigo-600 border-b-2 border-indigo-600">Login</button>
                    <button onclick="toggleAuth('register')" id="tabRegister" class="w-1/2 py-2 font-semibold text-gray-500">Sign Up</button>
                </div>

                <div id="loginForm">
                    <input type="text" id="logUsername" placeholder="Username" class="w-full mb-3 px-3 py-2 border rounded focus:ring-2 focus:ring-indigo-500">
                    <input type="password" id="logPassword" placeholder="Password" class="w-full mb-4 px-3 py-2 border rounded focus:ring-2 focus:ring-indigo-500">
                    <button onclick="login()" class="w-full bg-indigo-600 text-white font-bold py-2 rounded hover:bg-indigo-700 transition">Login</button>
                </div>

                <div id="registerForm" class="hidden">
                    <input type="email" id="regEmail" placeholder="Email" class="w-full mb-3 px-3 py-2 border rounded">
                    <input type="text" id="regUsername" placeholder="Username" class="w-full mb-3 px-3 py-2 border rounded">
                    <input type="text" id="regName" placeholder="First Name" class="w-full mb-3 px-3 py-2 border rounded">
                    <input type="text" id="regPhone" placeholder="Phone Number" class="w-full mb-3 px-3 py-2 border rounded">
                    <input type="password" id="regPassword" placeholder="Password" class="w-full mb-3 px-3 py-2 border rounded">
                    <input type="text" id="regRole" placeholder="Role (e.g., admin or user)" value="user" class="w-full mb-4 px-3 py-2 border rounded">
                    <button onclick="register()" class="w-full bg-green-600 text-white font-bold py-2 rounded hover:bg-green-700 transition">Create Account</button>
                </div>

                <p id="authMsg" class="text-sm mt-3 text-center font-medium"></p>
            </div>

            <div id="todoSection" class="hidden">
                <div class="mb-6 bg-gray-50 p-4 rounded border">
                    <input type="text" id="newTitle" placeholder="Task Title" class="w-full mb-2 px-3 py-2 border rounded text-sm">
                    <input type="text" id="newDesc" placeholder="Description (Optional)" class="w-full mb-2 px-3 py-2 border rounded text-sm">
                    <div class="flex gap-2">
                        <input type="number" id="newPriority" placeholder="Priority (1-5)" min="1" max="5" class="w-1/3 px-3 py-2 border rounded text-sm">
                        <button onclick="addTodo()" class="w-2/3 bg-indigo-600 text-white font-bold py-2 rounded hover:bg-indigo-700 transition text-sm">Add Task</button>
                    </div>
                </div>

                <ul id="todoList" class="space-y-3">
                    </ul>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = "https://fastapi-backend-rd-lab.onrender.com";

        // UI Elements
        const authSection = document.getElementById('authSection');
        const todoSection = document.getElementById('todoSection');
        const logoutBtn = document.getElementById('logoutBtn');
        const authMsg = document.getElementById('authMsg');
        const todoList = document.getElementById('todoList');

        window.onload = () => {
            if (localStorage.getItem("token")) {
                showTodoSection();
                fetchTodos();
            }
        };

        function toggleAuth(type) {
            document.getElementById('loginForm').classList.toggle('hidden', type !== 'login');
            document.getElementById('registerForm').classList.toggle('hidden', type !== 'register');
            document.getElementById('tabLogin').className = type === 'login' ? "w-1/2 py-2 font-semibold text-indigo-600 border-b-2 border-indigo-600" : "w-1/2 py-2 font-semibold text-gray-500 border-b-2 border-transparent";
            document.getElementById('tabRegister').className = type === 'register' ? "w-1/2 py-2 font-semibold text-indigo-600 border-b-2 border-indigo-600" : "w-1/2 py-2 font-semibold text-gray-500 border-b-2 border-transparent";
            authMsg.innerText = "";
        }

        // POST /auth/create_user
        async function register() {
            authMsg.className = "text-sm mt-3 text-center font-medium text-gray-600";
            authMsg.innerText = "Creating account...";
            
            const payload = {
                email: document.getElementById('regEmail').value,
                username: document.getElementById('regUsername').value,
                first_name: document.getElementById('regName').value,
                last_name: "User", // Hardcoded for simplicity, adjust if needed
                phone_number: document.getElementById('regPhone').value,
                password: document.getElementById('regPassword').value,
                role: document.getElementById('regRole').value
            };

            try {
                const response = await fetch(`${API_BASE_URL}/auth/create_user`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    authMsg.className = "text-sm mt-3 text-center font-medium text-green-600";
                    authMsg.innerText = "Account created! You can now log in.";
                    toggleAuth('login');
                } else {
                    const errorData = await response.json();
                    authMsg.className = "text-sm mt-3 text-center font-medium text-red-500";
                    authMsg.innerText = "Error: " + (errorData.detail || "Could not create account");
                }
            } catch (error) {
                authMsg.innerText = "Failed to connect to the server.";
            }
        }

        // POST /auth/token
        async function login() {
            const formData = new URLSearchParams();
            formData.append("username", document.getElementById('logUsername').value);
            formData.append("password", document.getElementById('logPassword').value);

            try {
                const response = await fetch(`${API_BASE_URL}/auth/token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem("token", data.access_token);
                    showTodoSection();
                    fetchTodos();
                } else {
                    authMsg.className = "text-sm mt-3 text-center font-medium text-red-500";
                    authMsg.innerText = "Invalid username or password.";
                }
            } catch (error) {
                authMsg.innerText = "Failed to connect to the server.";
            }
        }

        function logout() {
            localStorage.removeItem("token");
            authSection.classList.remove('hidden');
            todoSection.classList.add('hidden');
            logoutBtn.classList.add('hidden');
            authMsg.innerText = "";
        }

        // GET / (Read Db)
        async function fetchTodos() {
            const token = localStorage.getItem("token");
            try {
                const response = await fetch(`${API_BASE_URL}/`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.status === 401) return logout();

                const todos = await response.json();
                todoList.innerHTML = ""; 

                if (!todos || todos.length === 0) {
                    todoList.innerHTML = "<p class='text-gray-500 text-center text-sm'>No tasks yet. Add one above!</p>";
                }

                todos.forEach(todo => {
                    const li = document.createElement('li');
                    li.className = "flex justify-between items-center bg-gray-50 p-3 rounded border";
                    li.innerHTML = `
                        <div>
                            <p class="font-bold text-gray-800 ${todo.complete ? 'line-through text-gray-400' : ''}">${todo.title} <span class="text-xs bg-indigo-100 text-indigo-800 px-1 rounded ml-2">P${todo.priority}</span></p>
                            <p class="text-xs text-gray-500">${todo.description || ''}</p>
                        </div>
                        <div>
                            <button onclick="deleteTodo(${todo.id})" class="text-red-500 hover:text-red-700 font-bold px-2 py-1 bg-red-50 rounded text-sm">&times; Delete</button>
                        </div>
                    `;
                    todoList.appendChild(li);
                });
            } catch (error) {
                console.error("Error fetching todos:", error);
            }
        }

        // POST /todos/create
        async function addTodo() {
            const title = document.getElementById('newTitle').value;
            const description = document.getElementById('newDesc').value;
            const priority = document.getElementById('newPriority').value || 3;
            const token = localStorage.getItem("token");

            if (!title) return alert("Title is required");

            const payload = {
                title: title,
                description: description,
                priority: parseInt(priority),
                complete: false
            };

            await fetch(`${API_BASE_URL}/todos/create`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(payload)
            });

            document.getElementById('newTitle').value = "";
            document.getElementById('newDesc').value = "";
            document.getElementById('newPriority').value = "";
            fetchTodos();
        }

        // DELETE /todos/delete/{todo_id}
        async function deleteTodo(id) {
            const token = localStorage.getItem("token");
            await fetch(`${API_BASE_URL}/todos/delete/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            fetchTodos();
        }

        function showTodoSection() {
            authSection.classList.add('hidden');
            todoSection.classList.remove('hidden');
            logoutBtn.classList.remove('hidden');
        }
    </script>
</body>
</html>
