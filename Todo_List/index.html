<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI Todo App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <nav id="navbar" class="bg-indigo-600 p-4 text-white shadow-md hidden flex justify-between items-center">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <span>✅</span> My Tasks
        </h1>
        <div class="flex gap-4 items-center">
            <button onclick="switchView('dashboard')" class="hover:text-indigo-200 font-medium">Dashboard</button>
            <button onclick="switchView('profile'); loadProfile();" class="hover:text-indigo-200 font-medium">Profile</button>
            <button onclick="logout()" class="bg-indigo-700 hover:bg-indigo-800 px-4 py-1.5 rounded-md text-sm font-bold shadow-sm transition">Logout</button>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto mt-10 p-4">
        
        <div id="authView" class="bg-white rounded-xl shadow-lg overflow-hidden max-w-md mx-auto">
            <div class="flex border-b text-center">
                <button onclick="toggleAuth('login')" id="tabLogin" class="w-1/2 py-4 font-bold text-indigo-600 border-b-2 border-indigo-600 bg-indigo-50/50">Login</button>
                <button onclick="toggleAuth('register')" id="tabRegister" class="w-1/2 py-4 font-bold text-slate-500 hover:bg-slate-50 transition">Sign Up</button>
            </div>

            <div class="p-8">
                <div id="loginForm">
                    <input type="text" id="logUsername" placeholder="Username" class="w-full mb-4 px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                    <input type="password" id="logPassword" placeholder="Password" class="w-full mb-6 px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                    <button onclick="login()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition shadow-md">Login</button>
                </div>

                <div id="registerForm" class="hidden">
                    <input type="email" id="regEmail" placeholder="Email" class="w-full mb-3 px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm">
                    <input type="text" id="regUsername" placeholder="Username" class="w-full mb-3 px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm">
                    <input type="text" id="regName" placeholder="Full Name" class="w-full mb-3 px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm">
                    <input type="text" id="regPhone" placeholder="Phone Number" class="w-full mb-3 px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm">
                    <input type="password" id="regPassword" placeholder="Password" class="w-full mb-3 px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm">
                    <input type="hidden" id="regRole" value="user"> <button onclick="register()" class="w-full bg-emerald-600 text-white font-bold py-3 mt-2 rounded-lg hover:bg-emerald-700 transition shadow-md">Create Account</button>
                </div>
                <p id="authMsg" class="text-sm mt-4 text-center font-medium"></p>
            </div>
        </div>

        <div id="dashboardView" class="hidden">
            <div class="mb-8 bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <h2 class="text-lg font-bold mb-4 text-slate-700">Add New Task</h2>
                <input type="text" id="newTitle" placeholder="What needs to be done?" class="w-full mb-3 px-4 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                <input type="text" id="newDesc" placeholder="Description (Optional)" class="w-full mb-3 px-4 py-2.5 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                <div class="flex gap-3">
                    <div class="w-1/3">
                        <label class="text-xs text-slate-500 font-bold ml-1">Priority (1-5)</label>
                        <input type="number" id="newPriority" value="3" min="1" max="5" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                    </div>
                    <div class="w-2/3 flex items-end">
                        <button onclick="addTodo()" class="w-full bg-indigo-600 text-white font-bold py-2 rounded-lg hover:bg-indigo-700 transition shadow-md">Add Task</button>
                    </div>
                </div>
            </div>

            <ul id="todoList" class="space-y-3">
                </ul>
        </div>

        <div id="profileView" class="hidden space-y-6">
            
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <h2 class="text-xl font-bold mb-4 text-slate-700 border-b pb-2">Your Profile</h2>
                <div class="space-y-2 text-slate-600">
                    <p><span class="font-bold w-24 inline-block">Name:</span> <span id="profName"></span></p>
                    <p><span class="font-bold w-24 inline-block">Username:</span> <span id="profUser"></span></p>
                    <p><span class="font-bold w-24 inline-block">Email:</span> <span id="profEmail"></span></p>
                    <p><span class="font-bold w-24 inline-block">Role:</span> <span id="profRole" class="uppercase text-xs font-bold bg-indigo-100 text-indigo-800 px-2 py-0.5 rounded"></span></p>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <h3 class="font-bold text-slate-700 mb-3">Update Phone Number</h3>
                <div class="flex gap-2">
                    <input type="text" id="updatePhoneInput" placeholder="New Phone Number" class="w-2/3 px-4 py-2 border rounded-lg">
                    <button onclick="updatePhone()" class="w-1/3 bg-slate-800 text-white font-bold rounded-lg hover:bg-slate-900 transition text-sm">Save Phone</button>
                </div>
                <p id="phoneMsg" class="text-xs mt-2 font-medium"></p>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <h3 class="font-bold text-slate-700 mb-3">Change Password</h3>
                <input type="password" id="oldPwd" placeholder="Current Password" class="w-full mb-3 px-4 py-2 border rounded-lg text-sm">
                <input type="password" id="newPwd" placeholder="New Password (min 5 chars)" class="w-full mb-3 px-4 py-2 border rounded-lg text-sm">
                <button onclick="updatePassword()" class="w-full bg-red-500 text-white font-bold py-2 rounded-lg hover:bg-red-600 transition shadow-md">Update Password</button>
                <p id="pwdMsg" class="text-xs mt-2 font-medium text-center"></p>
            </div>

        </div>

    </div>

    <script>
        // Using relative path so it automatically works on whatever domain hosts it (Render or Localhost)
        const API_BASE_URL = ""; 

        // UI Elements
        const authView = document.getElementById('authView');
        const dashboardView = document.getElementById('dashboardView');
        const profileView = document.getElementById('profileView');
        const navbar = document.getElementById('navbar');
        const authMsg = document.getElementById('authMsg');
        const todoList = document.getElementById('todoList');

        window.onload = () => {
            if (localStorage.getItem("token")) {
                switchView('dashboard');
                fetchTodos();
            }
        };

        function toggleAuth(type) {
            document.getElementById('loginForm').classList.toggle('hidden', type !== 'login');
            document.getElementById('registerForm').classList.toggle('hidden', type !== 'register');
            document.getElementById('tabLogin').className = type === 'login' ? "w-1/2 py-4 font-bold text-indigo-600 border-b-2 border-indigo-600 bg-indigo-50/50" : "w-1/2 py-4 font-bold text-slate-500 hover:bg-slate-50 transition border-b-2 border-transparent";
            document.getElementById('tabRegister').className = type === 'register' ? "w-1/2 py-4 font-bold text-indigo-600 border-b-2 border-indigo-600 bg-indigo-50/50" : "w-1/2 py-4 font-bold text-slate-500 hover:bg-slate-50 transition border-b-2 border-transparent";
            authMsg.innerText = "";
        }

        function switchView(view) {
            authView.classList.add('hidden');
            dashboardView.classList.add('hidden');
            profileView.classList.add('hidden');
            navbar.classList.remove('hidden');

            if (view === 'dashboard') { dashboardView.classList.remove('hidden'); fetchTodos(); }
            if (view === 'profile') profileView.classList.remove('hidden');
            if (view === 'auth') {
                authView.classList.remove('hidden');
                navbar.classList.add('hidden');
            }
        }

        async function apiRequest(endpoint, method = 'GET', body = null, isFormUrlEncoded = false) {
            const token = localStorage.getItem("token");
            const headers = {};
            
            if (token) headers['Authorization'] = `Bearer ${token}`;
            
            if (isFormUrlEncoded) {
                headers['Content-Type'] = 'application/x-www-form-urlencoded';
            } else if (body) {
                headers['Content-Type'] = 'application/json';
                body = JSON.stringify(body);
            }

            const response = await fetch(API_BASE_URL + endpoint, { method, headers, body });
            
            if (response.status === 401 && endpoint !== '/auth/token') {
                logout();
                throw new Error("Unauthorized");
            }
            return response;
        }

        // ================= AUTHENTICATION =================

        async function register() {
            authMsg.className = "text-sm mt-3 text-center font-medium text-slate-500";
            authMsg.innerText = "Creating account...";
            
            const payload = {
                email: document.getElementById('regEmail').value,
                username: document.getElementById('regUsername').value,
                name: document.getElementById('regName').value,
                phone_number: document.getElementById('regPhone').value,
                password: document.getElementById('regPassword').value,
                role: document.getElementById('regRole').value
            };

            try {
                const response = await apiRequest('/auth/create_user', 'POST', payload);
                if (response.ok) {
                    authMsg.className = "text-sm mt-3 text-center font-medium text-emerald-600";
                    authMsg.innerText = "Account created! You can now log in.";
                    toggleAuth('login');
                } else {
                    const data = await response.json();
                    authMsg.className = "text-sm mt-3 text-center font-medium text-red-500";
                    authMsg.innerText = "Error: " + (data.detail || "Validation Failed");
                }
            } catch (err) { authMsg.innerText = "Server error."; }
        }

        async function login() {
            const formData = new URLSearchParams();
            formData.append("username", document.getElementById('logUsername').value);
            formData.append("password", document.getElementById('logPassword').value);

            try {
                const response = await apiRequest('/auth/token', 'POST', formData, true);
                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem("token", data.access_token);
                    switchView('dashboard');
                } else {
                    authMsg.className = "text-sm mt-3 text-center font-medium text-red-500";
                    authMsg.innerText = "Invalid username or password.";
                }
            } catch (err) { authMsg.innerText = "Server error."; }
        }

        function logout() {
            localStorage.removeItem("token");
            switchView('auth');
            document.getElementById('logPassword').value = "";
        }

        // ================= TODOS (Dashboard) =================

        async function fetchTodos() {
            try {
                const response = await apiRequest('/');
                const todos = await response.json();
                todoList.innerHTML = ""; 

                if (!todos || todos.length === 0) {
                    todoList.innerHTML = "<div class='text-center py-10'><p class='text-slate-500 text-lg'>All caught up! 🎉</p><p class='text-sm text-slate-400 mt-1'>Add a task above to get started.</p></div>";
                    return;
                }

                // Sort so incomplete tasks are at the top
                todos.sort((a, b) => a.status - b.status);

                todos.forEach(todo => {
                    const li = document.createElement('li');
                    li.className = `flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border transition ${todo.status ? 'opacity-60 border-slate-200' : 'border-indigo-100 hover:shadow-md'}`;
                    
                    li.innerHTML = `
                        <div class="flex items-start gap-4">
                            <button onclick='toggleTodoStatus(${JSON.stringify(todo)})' class="mt-1 flex-shrink-0 w-6 h-6 rounded border-2 flex items-center justify-center transition ${todo.status ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-300 text-transparent hover:border-indigo-400'}">
                                ✓
                            </button>
                            <div>
                                <p class="font-bold text-slate-800 ${todo.status ? 'line-through text-slate-500' : ''}">
                                    ${todo.title} 
                                    <span class="text-[10px] uppercase font-bold bg-amber-100 text-amber-800 px-1.5 py-0.5 rounded ml-2 align-middle">Priority ${todo.priority}</span>
                                </p>
                                <p class="text-sm text-slate-500 mt-0.5 ${todo.status ? 'line-through' : ''}">${todo.description || ''}</p>
                            </div>
                        </div>
                        <button onclick="deleteTodo(${todo.id})" class="text-red-400 hover:text-red-600 font-bold p-2 hover:bg-red-50 rounded-lg transition">Delete</button>
                    `;
                    todoList.appendChild(li);
                });
            } catch (err) {}
        }

        async function addTodo() {
            const payload = {
                title: document.getElementById('newTitle').value,
                description: document.getElementById('newDesc').value,
                priority: parseInt(document.getElementById('newPriority').value) || 3,
                status: false // Matches Schema!
            };

            if (!payload.title || payload.title.length < 3) return alert("Title must be at least 3 characters");

            await apiRequest('/todos/create', 'POST', payload);
            
            document.getElementById('newTitle').value = "";
            document.getElementById('newDesc').value = "";
            document.getElementById('newPriority').value = "3";
            fetchTodos();
        }

        async function toggleTodoStatus(todo) {
            // Flip the boolean status
            todo.status = !todo.status; 
            await apiRequest(`/todos/update/${todo.id}`, 'PUT', todo);
            fetchTodos();
        }

        async function deleteTodo(id) {
            if(confirm("Are you sure you want to delete this task?")) {
                await apiRequest(`/todos/delete/${id}`, 'DELETE');
                fetchTodos();
            }
        }

        // ================= USER PROFILE =================

        async function loadProfile() {
            try {
                const response = await apiRequest('/user/details');
                const user = await response.json();
                
                document.getElementById('profName').innerText = user.name;
                document.getElementById('profUser').innerText = user.username;
                document.getElementById('profEmail').innerText = user.email;
                document.getElementById('profRole').innerText = user.role;
                document.getElementById('updatePhoneInput').value = user.phone_number;
            } catch (err) {}
        }

        async function updatePhone() {
            const newPhone = document.getElementById('updatePhoneInput').value;
            const msg = document.getElementById('phoneMsg');
            
            const response = await apiRequest(`/user/phonenumber/${newPhone}`, 'PUT');
            if (response.ok) {
                msg.className = "text-xs mt-2 font-medium text-emerald-600";
                msg.innerText = "Phone number updated successfully!";
            } else {
                msg.className = "text-xs mt-2 font-medium text-red-500";
                msg.innerText = "Failed to update phone number.";
            }
            setTimeout(() => msg.innerText = "", 3000);
        }

        async function updatePassword() {
            const payload = {
                password: document.getElementById('oldPwd').value,
                new_password: document.getElementById('newPwd').value
            };
            const msg = document.getElementById('pwdMsg');

            if (payload.new_password.length < 5) {
                msg.className = "text-xs mt-2 font-medium text-red-500";
                msg.innerText = "New password must be at least 5 characters.";
                return;
            }

            const response = await apiRequest('/user/password', 'PUT', payload);
            if (response.ok) {
                msg.className = "text-xs mt-2 font-medium text-emerald-600";
                msg.innerText = "Password updated successfully!";
                document.getElementById('oldPwd').value = "";
                document.getElementById('newPwd').value = "";
            } else {
                msg.className = "text-xs mt-2 font-medium text-red-500";
                msg.innerText = "Incorrect current password.";
            }
        }
    </script>
</body>
</html>
