<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="auth-section">
    <h2>🔐 Login</h2>
    <input id="login-username" placeholder="Username">
    <input id="login-password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>

    <hr>

    <h3>📝 Register</h3>
    <input id="reg-email" placeholder="Email">
    <input id="reg-username" placeholder="Username">
    <input id="reg-name" placeholder="Name">
    <input id="reg-phone" placeholder="Phone">
    <input id="reg-password" type="password" placeholder="Password">
    <input id="reg-role" placeholder="Role">
    <button onclick="register()">Register</button>
</div>

<div id="app-section" style="display:none;">
    <h2>Todo Dashboard</h2>
    <button onclick="loadTodos()">Refresh</button>
    
    <p id="user-info"></p>
    <button onclick="logout()">Logout</button>

    <h3>Create Todo</h3>
    <input id="title" placeholder="Title">
    <input id="description" placeholder="Description">
    <input id="priority" type="number" placeholder="Priority (1-5)">
    <label>Status <input id="status" type="checkbox"></label>
    <button onclick="createTodo()">Create</button>

    <h3>Todos</h3>
    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Description</th>
                <th>Priority</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="todo-list"></tbody>
    </table>
</div>

<script src="script.js"></script>
</body>
</html>
